spring.application.name=EvenDecor
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=eventDecor_booking_system;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.web.resources.static-locations=file:uploads/
#Cau hinh JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Đường dẫn thư mục upload (dùng thư mục upload có sẵn trong project)
file.upload-dir=upload
# URL prefix để truy cập ảnh
file.base-url=http://localhost:8080/images/
