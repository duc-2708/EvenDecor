<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="card mb-3" style="border: none">
    <img src="https://placehold.co/1080x250" class="card-img-top" style="border-radius: 18px" alt="...">
    <div class="card-body">
        <h5 class="card-title text-center text-danger fs-1" style="font-family: 'Great Vibes', cursive">EVEN DECOR</h5>
        <p class="card-text text-center">“Chúng tôi không chỉ trang trí – chúng tôi kể chuyện bằng không gian.”</p>
    </div>

    <div class="container" >
        <div class="row">
            <div class="card col=6" style="width: 30rem; border: none;"
            th:each="c : ${list}">
                <img src="https://placehold.co/250x250" class="card-img-top " style="border-radius: 18px" alt="...">
                <div class="card-body">
                    <p class="card-text text-center"><a th:text="${c.category}" href="">san pham 1</a></p>
                </div>
            </div>
            </div>
        <div>
            <h2 class="text-center"><a href="" class="btn btn-outline-danger">XEM THÊM</a></h2>
        </div>
    </div>

</div>
</body>
</html>
