<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

	<div class="container py-5 h-100">
		<div
			class="row d-flex justify-content-center align-items-center h-100">
			<div class="col-12 col-md-8 col-lg-6 col-xl-5">
				<div class="card text-white"
					style="border-radius: 1rem; background-color: #f7f7f7;">
					<div class="card-body p-5 text-center">

						<div class="mb-md-0 mt-md-3 pb-3">

							<h2 class="fw-bold mb-2 text-primary text-uppercase">Đăng
								Nhập</h2>
							<p th:if="${er}" class="alert alert-danger text-center">
								<span th:text="${er}"></span>
							</p>
							<form action="check" method="post">
								<div data-mdb-input-init
									class="form-outline form-white mb-4">
									<input type="email" id="typeEmailX"
										class="form-control form-control-lg" placeholder="Tài Khoản"
										name="email" />
								</div>

								<div data-mdb-input-init class="form-outline form-white mb-4">
									<input type="password" id="typePasswordX"
										class="form-control form-control-lg" placeholder="Mật Khẩu"
										name="pass" />
								</div>

								<p class="small mb-3 pb-lg-2">
									<a class="text-primary">Quên mật khẩu?</a>
								</p>

								<button data-mdb-button-init data-mdb-ripple-init
									class="btn btn-primary btn-lg px-5" type="submit">Đăng
									nhập</button>

							</form>
						</div>

						<div>
							<p class="mb-0 text-dark"> <a th:href="@{/EvenDecor/signUp}"
									class="text-primary fw-bold">Bạn không có tài khoản?</a> </p>
						</div>

					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
