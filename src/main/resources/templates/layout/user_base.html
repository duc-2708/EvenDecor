<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EvenDecor</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<header class="text-center border border-black">
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold text-danger" href="/EvenDecor" style="font-family: 'Great Vibes', cursive">EvenDecor</a>

            <!-- Toggle button mobile -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- Menu trái -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link btn-base active"  href="#">Trang chủ</a>
                    </li>

                    <li class="nav-item"><a class="nav-link btn-base" href="#">Decor sự kiện</a>
                    </li>

                    <li class="nav-item"><a class="nav-link btn-base" href="#">Decor phòng</a>
                    </li>

                    <li class="nav-item"><a class="nav-link btn-base" href="#">Liên hệ</a>
                    </li>


                </ul>

                <!-- Search -->
                <form class="d-flex me-3">
                    <input class="form-control border-dark me-2 " type="search"
                           placeholder="Search...">
                    <button class="btn btn-success" type="submit">Search</button>
                </form>

                <!-- Avatar dropdown -->
                <div class="dropdown">
                    <a
                            class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle"
                            href="#" role="button" data-bs-toggle="dropdown">  <span>Account</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-center">
                        <li><a class="dropdown-item" th:href="@{/EvenDecor/login}">Sign in</a></li>
                        <li><a class="dropdown-item" th:href="@{/EvenDecor/signUp}">Sign up</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </nav>
</header>

<section class="flex-fill" style="background-color: #a4cdfcff;">
    <div class="container py-4">
        <div th:insert="${content}"></div>
    </div>
</section>

<footer class="text-center py-3 border border-black">
    <p class="mb-0" &copy;> PP03476- Nguyễn Tiến Đức.</p>
</footer>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
